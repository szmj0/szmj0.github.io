var pass = document.getElementById('pass'),notpass = document.getElementById('notpass'),testover = document.getElementById('testover'),kj = document.getElementById('kj'),updatesm = document.getElementById('updatesm'),imgsm = document.getElementById('imgsm'),m = 0, n = 0,j = 0,k = 0;

function processLines() {
	m = 0, n = 0,j = 0;
    var webtest = document.getElementById('webtest');
    var text =  webtest.value;
    var lines = text.split('\n'); // 使用 '\n' 分割行
	

    // 遍历每行并处理
    lines.forEach(function(line, index) {
		var substr = line.slice(0, 4);
		line = line.trim();
		if (line.length > 0) {
			if (substr != "http") line = 'https://' + line;
			console.log('行 ' + (index + 1) + ': ' + line);
			checkWebsite(line);
			j +=1;
		}
		k = j - 1;
		testover.innerHTML = '<h3>待测试网址还有：<span  style=" font-size:16; color:red;font-weight: bold;">'+ k +'</span>个</h3><p>测试结果：共测试<span  style=" font-size:16; color:red;font-weight: bold;">'+ j + '</span>个网址，通过<span  style=" font-size:16; color:red;font-weight: bold;">' + m + '</span>个，失败<span  style=" font-size:16; color:red;font-weight: bold;">' + n + '</span>个</p>';

    });
	window.resizeBy(0, 100);
} 
function checkWebsite(url) {
	pass.innerHTML = '';
	notpass.innerHTML = '';
	kj.innerHTML = '';
	imgsm.style.display="none";
	updatesm.innerHTML = '';
    const xhr = new XMLHttpRequest();
    xhr.open('HEAD', url, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) { // 请求完成
            if (xhr.status >= 200 && xhr.status < 300) {
				pass.innerHTML = pass.innerHTML + url + '<br>';
				m+= 1;
				testover.innerHTML = '<h3>待测试网址还有：<span  style=" font-size:16; color:red;font-weight: bold;">'+ k +'</span>个</h3><p>测试结果：共测试<span  style=" font-size:16; color:red;font-weight: bold;">'+ j + '</span>个网址，通过<span  style=" font-size:16; color:red;font-weight: bold;">' + m + '</span>个，失败<span  style=" font-size:16; color:red;font-weight: bold;">' + n + '</span>个</p>';
				k -=1;
            } else {
                notpass.innerHTML = notpass.innerHTML + url + '<br>';
				n+= 1;
				testover.innerHTML = '<h3>待测试网址还有：<span  style=" font-size:16; color:red;font-weight: bold;">'+ k +'</span>个</h3><p>测试结果：共测试<span  style=" font-size:16; color:red;font-weight: bold;">'+ j + '</span>个网址，通过<span  style=" font-size:16; color:red;font-weight: bold;">' + m + '</span>个，失败<span  style=" font-size:16; color:red;font-weight: bold;">' + n + '</span>个</p>';
				k -=1;
            }
        }
    };
    xhr.send();
}
function mtest() {
	var mtext = notpass.innerText;
	var nopasslines = mtext.split('\n'); 
	kj.innerHTML = '';
	for (i = 0; i <= nopasslines.length-2; i++) {
		var newDiv = document.createElement("div");
		newDiv.style.flex = "1";
		newDiv.style.margin= "10px";
		newDiv.innerHTML = '<div id=kjid' + i + ' align="center" style="display: inline-block;width:300px;"><table style="width:302px;border: 1px solid black; border-collapse: collapse;"><tr><td width="85%;"><span style="word-break: break-all;">'+nopasslines[i]+'</span></td><td width="15%;"><input type="submit" name="Submit" value="刷新" onClick="updatekj(kjid'+i+');"></td></tr></table><iframe src="'+nopasslines[i]+'" width="300px" height="300" style="border:1px solid black;"></iframe></div>';
		kj.appendChild(newDiv);
	}
	updatesm.innerHTML = '<div align="left"><br><b>*刷新说明：<br>1、手动测试功能，需要在chrome浏览器中進行，firefox无法测试；<br>2、某个页面打开是空白时，请多等一下，是页面正在加载中；<br>3、加载完成后，页面报错误信息，可以点“刷新”，从新加载此页面，排除因网络波动原因造成的网址暂时无法访问；<br>4、多加载几次还是不行，请检查翻墙软件是否还能正常连天地行或明慧邮箱网址等，测试一下。</b><br></div><br>';
	imgsm.style.display="block";
}
